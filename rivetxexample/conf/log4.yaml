refresh_rate: 10
appenders:
  stdout:
    kind: "console"
    pattern: "[%U %D %T] [%C] [%L] (%S) %M"
  file:
    kind: "file"
    pattern: "[%U %D %T] [%C] [%L] (%S) %M"
    path: "./logs/rivetxgo.log"

root:
  level: debug
  appenders:
    - stdout
    - file

loggers:
  main:
    level: debug
    additive: true
  test:
    level: debug
    additive: true
  rivetxsql:
    level: debug
    additive: true







